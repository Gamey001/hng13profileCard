<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamaliel Dashua | Profile Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main>
      <article data-testid="test-profile-card">
        <header>
          <h2 data-testid="test-user-name">Gamaliel Dashua</h2>
        </header>

        <figure>
          <img
            src="avatar.png"
            alt="Profile photo of Gamaliel Dashua"
            data-testid="test-user-avatar"
          />
        </figure>

        <p data-testid="test-user-bio">
          Frontend developer passionate about accessibility, clean UI, and
          creating meaningful user experiences.
        </p>

        <p>
          Current time (ms):
          <span
            data-testid="test-user-time"
            id="current-time"
            aria-live="polite"
            aria-atomic="true"
          ></span>
        </p>

        <nav data-testid="test-user-social-links">
          <ul>
            <li>
              <a
                href="https://twitter.com/GamalielDashua"
                target="_blank"
                rel="noopener noreferrer"
                data-testid="test-user-social-twitter"
                >Twitter</a
              >
            </li>
            <li>
              <a
                href="https://github.com/Gamey001"
                target="_blank"
                rel="noopener noreferrer"
                data-testid="test-user-social-github"
                >GitHub</a
              >
            </li>
          </ul>
        </nav>

        <section data-testid="test-user-hobbies">
          <h3>Hobbies</h3>
          <ul>
            <li>Coding</li>
            <li>Playing guitar</li>
            <li>UI design exploration</li>
          </ul>
        </section>

        <section data-testid="test-user-dislikes">
          <h3>Dislikes</h3>
          <ul>
            <li>Spam</li>
            <li>People who look down on others</li>
            <li>Messy code</li>
          </ul>
        </section>
      </article>
    </main>

    <script>
      const timeEl = document.getElementById("current-time");
      function updateTime() {
        timeEl.textContent = Date.now();
      }
      updateTime();
      setInterval(updateTime, 1000);
    </script>
  </body>
</html>
