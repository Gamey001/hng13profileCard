<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gamaliel Dashua | Profile Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <article data-testid="test-profile-card">
      <header>
        <h2 data-testid="test-user-name">Gamaliel Dashua</h2>
      </header>

      <figure>
        <img
          src="avatar.png"
          alt="Profile photo of Gamaliel Dashua"
          data-testid="test-user-avatar"
        />
      </figure>

      <p data-testid="test-user-bio">
        Frontend developer passionate about accessibility, clean UI, and
        creating meaningful user experiences.
      </p>

      <p>
        Current time (ms):
        <span data-testid="test-user-time" id="current-time"></span>
      </p>

      <nav data-testid="test-user-social-links">
        <ul>
          <li>
            <a
              href="https://twitter.com/"
              target="_blank"
              rel="noopener noreferrer"
              data-testid="test-user-social-twitter"
              >Twitter</a
            >
          </li>
          <li>
            <a
              href="https://github.com/"
              target="_blank"
              rel="noopener noreferrer"
              data-testid="test-user-social-github"
              >GitHub</a
            >
          </li>
        </ul>
      </nav>

      <section data-testid="test-user-hobbies">
        <h3>Hobbies</h3>
        <ul>
          <li>Coding</li>
          <li>Playing guitar</li>
          <li>UI design exploration</li>
        </ul>
      </section>

      <section data-testid="test-user-dislikes">
        <h3>Dislikes</h3>
        <ul>
          <li>Spam</li>
          <li>People who look down on others</li>
          <li>Messy code</li>
        </ul>
      </section>
    </article>

    <!-- Scripts -->
    <script src="script.js"></script>
    <script src="tests.js"></script>
  </body>
</html>
